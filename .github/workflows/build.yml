name: Build and Push to ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::455982475279:role/github-actions-abuelito-app

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin 455982475279.dkr.ecr.us-east-1.amazonaws.com

      - name: Build and push image
        run: |
          IMAGE_URI=455982475279.dkr.ecr.us-east-1.amazonaws.com/abuelito-web
          TAG=${{ github.sha }}

          docker build -t $IMAGE_URI:$TAG .
          docker push $IMAGE_URI:$TAG

          docker tag $IMAGE_URI:$TAG $IMAGE_URI:latest
          docker push $IMAGE_URI:latest