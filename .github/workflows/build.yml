name: Build, Push and Deploy to ECS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::455982475279:role/github-actions-abuelito-app

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin 455982475279.dkr.ecr.us-east-1.amazonaws.com

      - name: Build and push image
        run: |
          IMAGE_URI=455982475279.dkr.ecr.us-east-1.amazonaws.com/abuelito-web
          TAG=${{ github.sha }}

          docker build --build-arg APP_VERSION=$TAG -t $IMAGE_URI:$TAG .
          docker push $IMAGE_URI:$TAG

      - name: Get current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition AbuelitodevabuelitodevserviceTaskDef2D84DB80 \
            --region us-east-1 \
            > task-definition.json

      - name: Update task definition image
        run: |
          IMAGE_URI=455982475279.dkr.ecr.us-east-1.amazonaws.com/abuelito-web:${{ github.sha }}

          cat task-definition.json \
            | jq '.taskDefinition' \
            | jq '.containerDefinitions[0].image = "'$IMAGE_URI'"' \
            | jq 'del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )' \
            > new-task-definition.json

      - name: Register new task definition
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://new-task-definition.json \
            --region us-east-1 \
            > task-output.json

      - name: Get new task definition ARN
        run: |
          TASK_DEF_ARN=$(jq -r '.taskDefinition.taskDefinitionArn' task-output.json)
          echo "TASK_DEF_ARN=$TASK_DEF_ARN" >> $GITHUB_ENV

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster abuelito-dev-cluster \
            --service abuelito-dev-service \
            --task-definition $TASK_DEF_ARN \
            --region us-east-1